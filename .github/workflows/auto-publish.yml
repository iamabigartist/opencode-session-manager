name: Auto Tag & Publish

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
  workflow_dispatch:
    inputs:
      version:
        description: "package.json version to publish, without the leading v"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-version:
    if: github.repository == 'RatmmmhSquishyRat/opencode-session-manager' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Read package metadata
        id: pkg
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          if [[ -n "$REQUESTED_VERSION" && "$REQUESTED_VERSION" != "$version" ]]; then
            echo "workflow_dispatch version '$REQUESTED_VERSION' does not match package.json version '$version'."
            exit 1
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Inspect release state
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${{ steps.pkg.outputs.tag }}"
          name="${{ steps.pkg.outputs.name }}"
          version="${{ steps.pkg.outputs.version }}"

          git fetch --tags --force

          tag_exists=false
          tag_matches_head=false
          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_exists=true
            tag_sha="$(git rev-list -n 1 "$tag")"
            head_sha="$(git rev-parse HEAD)"
            if [[ "$tag_sha" != "$head_sha" ]]; then
              echo "Tag $tag already exists at $tag_sha, but HEAD is $head_sha. Bump package.json version."
              exit 1
            fi
            tag_matches_head=true
          fi

          npm_exists=false
          if npm view "$name@$version" version >/dev/null 2>&1; then
            npm_exists=true
          fi

          release_exists=false
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_exists=true
          fi

          if [[ "$npm_exists" == "true" && "$tag_matches_head" != "true" ]]; then
            echo "npm package $name@$version exists, but matching git tag $tag does not point at this commit."
            exit 1
          fi

          if [[ "$npm_exists" != "true" && "$release_exists" == "true" ]]; then
            echo "GitHub Release $tag exists before npm package $name@$version. Resolve release state manually."
            exit 1
          fi

          echo "skip_tag=$tag_exists" >> "$GITHUB_OUTPUT"
          echo "skip_publish=$npm_exists" >> "$GITHUB_OUTPUT"
          echo "skip_release=$release_exists" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package
        run: bun run check:package

      - name: Create and push tag
        if: steps.state.outputs.skip_tag != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.pkg.outputs.tag }}" -m "${{ steps.pkg.outputs.tag }}"
          git push origin "${{ steps.pkg.outputs.tag }}"

      - name: Publish to npm
        if: steps.state.outputs.skip_publish != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.state.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: ${{ steps.pkg.outputs.tag }}
          generate_release_notes: true
