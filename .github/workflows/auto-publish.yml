name: Auto Tag & Publish

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "V=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.version.outputs.V }}" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.V }}" -m "v${{ steps.version.outputs.V }}"
          git push origin "v${{ steps.version.outputs.V }}"

      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.V }}
          name: v${{ steps.version.outputs.V }}
          generate_release_notes: true

      - name: Setup Bun
        if: steps.check.outputs.EXISTS == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.check.outputs.EXISTS == 'false'
        run: bun install --frozen-lockfile

      - name: Verify & publish
        if: steps.check.outputs.EXISTS == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
